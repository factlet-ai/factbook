- id: f002
  name: factbook-scope-isolation
  summary: Factbooks for distinct projects MUST live in physically separate
    repos AND use scoped fact-id citations to prevent LLM cross-contamination
  category: engineering_rule
  factlet_type: anti_pattern
  statement: |
    When two factbooks for distinct projects are co-located in the same
    git repo (e.g. .nora/kernora-factbook.yaml AND .nora/factlet-factbook.yaml
    in github.com/kernora-ai/kernora), an LLM consuming both into the same
    context window can confuse fact origin, apply project-A rules to project-B
    work, and miscite IDs that collide across files (both factbooks
    independently number f001, f002...). Verified empirically 2026-05-06:
    in a single session the factlet-factbook was authored INTO the kernora
    repo (wrong location), and an external CTA on kernora.ai pointed at
    factlet.ai/evals (which had not deployed) instead of the working
    GitHub URL — both errors traceable to insufficient scope demarcation
    between the two projects' truth.
  rule: |
    A factbook for `project:X` MUST live in a repo physically separate from
    factbooks for `project:Y` — typically the project's own repo
    (factlet-ai/factbook for project:factlet-ai; kernora-ai/kernora's .nora/
    for project:kernora). Co-location in a single repo is permitted ONLY
    when both factbooks share the same scope (e.g. project:kernora has
    kernora-factbook.yaml + lite-mode-factbook.yaml, both project:kernora).
  citation_rule: |
    External references to facts in this factbook MUST use the
    `<scope>:<id>` prefix form — `factlet-ai:f001`, NOT bare `f001`. Inside
    this factbook file, the bare `id` form is permitted because the
    file-level `scope:` field provides the prefix unambiguously. This
    citation rule is being submitted as RFC-001 against the v0.2 spec.
  remediation_taken_2026_05_06:
    - "Created github.com/factlet-ai/factbook as canonical home for project:factlet-ai facts"
    - "Migrated factlet-factbook content from kernora repo to new factbook repo"
    - "Tombstoned kernora-side .nora/factlet-factbook.yaml with redirect note"
    - "Updated CLAUDE.md in kernora repo to point at new location"
    - "Filed RFC-001 against factlet-ai/spec proposing scoped-id citation rule for v0.2"
  sources:
    - "incident:2026-05-06-factbook-cross-contamination-near-miss"
    - "github.com/factlet-ai/spec/blob/main/rfcs/0001-scoped-fact-ids.md"
