summary: |
  Operational + decision facts for the factlet-ai GitHub org and the factlet.ai
  website. This is the factlet-ai project's OWN factbook — eaten as dogfood,
  hosted as a separate repo (per the v0.2 scoping discipline) to prevent
  cross-contamination with the Kernora project factbook.

  Distinct from:
    - .nora/kernora-factbook.yaml in github.com/kernora-ai/kernora (private,
      scope=project:kernora — the commercial Kernora product)
    - Per-team example factbooks at factlet-ai/registry (payments / frontend /
      ml-pipeline — illustrative, not operational)

  This factbook covers: deploy mechanics for factlet.ai (Cloudflare Pages),
  the public eval suite at github.com/factlet-ai/evals, the open Factlet
  Protocol spec, factbook scoping discipline (v0.2), and the relationship to
  Kernora as the reference implementation.

  CONSUME THIS BEFORE pushing to any factlet-ai/* repo, editing factlet.ai
  website content, or making cross-claims that touch both kernora.ai and
  factlet.ai.

