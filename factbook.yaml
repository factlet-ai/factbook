content:

- id: f001
  name: factlet-ai-website-deploy-mechanics
  summary: Direct git push to main on factlet-ai/factlet.ai does not reliably
    trigger Cloudflare Pages auto-deploy; PR-merge or manual wrangler deploy required
  category: engineering_rule
  factlet_type: anti_pattern
  statement: |
    factlet.ai (the website) is hosted on Cloudflare Pages with a documented
    GitHub auto-deploy integration ("Pushes to main auto-deploy" per the repo
    README), but as of 2026-05-06 direct pushes to main from a non-PR workflow
    do NOT reliably trigger production deploys. Verified by incident:
    commits c8442a2 (feat(evals): /evals page + nav link + homepage eval section)
    and 981b890 (fix(evals): add evals/index.html + redirect rule) were pushed
    to factlet-ai/factlet.ai main, landed in git, but the production site at
    factlet.ai/evals/ continued to serve the homepage 30+ minutes after push
    while curl-direct file paths /evals.html and /evals/ both returned the
    homepage <title>. Every prior commit on the repo (#2 through #9 by
    mihir-kernora) reached production via PR-merge — direct-push commits
    are observably absent from the deployed bundle.
  workaround: |
    Three options for deploying factlet.ai content:
      (a) Open a GitHub PR with the changes and merge — historically works
          (every prior production commit followed this path).
      (b) Use wrangler CLI directly:
            export CLOUDFLARE_API_TOKEN=<token>
            cd <factlet.ai-repo-root>
            wrangler pages deploy . --project-name=factlet-ai --branch=main
          As of 2026-05-06, no CLOUDFLARE_API_TOKEN is in the kernora repo's
          .env, and wrangler whoami returns "Not logged in". Operator must
          provide auth.
      (c) Cloudflare Pages dashboard → Workers & Pages → factlet-ai →
          Deployments → "Retry deployment" or Settings → Git → reconnect
          GitHub integration if it has been disconnected.
    Default until investigated: route all factlet.ai content via PRs.
  external_link_strategy: |
    When kernora.ai or other surfaces need to link to eval methodology /
    results, point at github.com/factlet-ai/evals (the GitHub repo URL —
    serves markdown directly via GitHub's renderer) NOT factlet.ai/evals
    (the Cloudflare-hosted URL) until the Cloudflare deploy is unblocked.
    Revert the link to factlet.ai/evals once production is current.
  related_facts:
    - "kernora:f??? — kernora.ai (Firebase Hosting) requires manual `firebase deploy --only hosting`; no auto-deploy on git push. Different vendor, similar manual-deploy reality."
  sources:
    - "github.com/factlet-ai/factlet.ai/commits/main (commits c8442a2, 981b890)"
    - "incident:2026-05-06-factlet-cloudflare-deploy-stuck"
    - "github.com/factlet-ai/factlet.ai/README.md (claims 'Pushes to main auto-deploy via the Cloudflare Pages git integration')"
  freshness:
    extracted_at: '2026-05-06'
    method: human_curated
  scope: project:factlet-ai
