- id: f001
  name: factlet-ai-website-deploy-mechanics
  summary: factlet.ai (Cloudflare Pages) was originally a Direct Upload project;
    Direct Upload projects CANNOT be retroactively connected to Git. Migrated
    2026-05-06 to a new git-connected project. Auto-deploy is now wired.
  category: engineering_rule
  factlet_type: lesson_learned
  statement: |
    factlet.ai (the website) is hosted on Cloudflare Pages. Originally created
    as a Direct Upload project (someone deployed via wrangler or dashboard
    drag-and-drop), so the README's claim "Pushes to main auto-deploy via
    the Cloudflare Pages git integration" was aspirational — Direct Upload
    projects in Cloudflare Pages CANNOT be retroactively connected to Git
    (no "Connect to Git" option appears in Settings; verified empirically
    2026-05-06). All deploys had to be manual via wrangler or dashboard
    upload, despite the README claim and despite multiple direct pushes
    landing in git but not deploying.

    RESOLVED 2026-05-06 by migration:
      1. Created NEW Pages project (`factlet-ai`) connected to git
      2. New project auto-deployed on first push to
         factlet-ai.choudharymihir.workers.dev (its workers.dev URL)
      3. Removed `factlet.ai` custom domain from old Direct Upload project
      4. Added `factlet.ai` custom domain to new git-connected project
      5. Verified factlet.ai/ + factlet.ai/evals/ serve current main

    Old Direct Upload project retained briefly as rollback safety net;
    delete after 24-48 hours of clean operation on the new project.
  current_state: |
    As of 2026-05-06 ~14:00 PT: factlet.ai is served by a git-connected
    Cloudflare Pages project. ANY push to factlet-ai/factlet.ai main
    auto-deploys within ~60s. The README's claim is now accurate.
    No CLOUDFLARE_API_TOKEN is required for routine deploys.
  why_initial_setup_was_wrong: |
    Whoever first created the Cloudflare Pages project chose Direct Upload
    (the easier option for a one-time deploy). Once chosen, Direct Upload
    is immutable — the project cannot be converted to git-connected. This
    is a Cloudflare platform limitation, not a misconfiguration. The
    aspirational README line was written assuming git integration WOULD
    be set up later but never was, until the 2026-05-06 incident forced it.
  prevention: |
    For any new Cloudflare Pages project (factlet-ai/* or kernora-ai/*),
    ALWAYS choose "Connect to Git" at project creation, never "Direct
    Upload." Direct Upload is one-way; Git Connection is reversible.
    If you find yourself reaching for `wrangler pages deploy <dir>` from
    a local machine on a project that should track a git branch — STOP
    and check whether the project is Direct Upload. If yes, plan a
    migration before deploying further changes.
  related_facts:
    - "kernora:f??? — kernora.ai (Firebase Hosting) requires manual `firebase deploy --only hosting`; no git auto-deploy. Different vendor, similar gap to fix later."
    - "factlet-ai:f003 — single-author admin-merge governance (used during today's incident triage)"
  sources:
    - "incident:2026-05-06-factlet-cloudflare-deploy-stuck (resolved)"
    - "github.com/factlet-ai/factlet.ai/commits/main"
    - "Cloudflare Pages docs: Direct Upload projects cannot be linked to a Git repository post-creation"
  freshness:
